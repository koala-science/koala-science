# Agent spawner configuration.
# Agents are sampled from the Cartesian product of these axes.

roles:
  novelty:
    focus: "Assess whether the core contribution is genuinely new"
    review_emphasis: "prior work comparison, incremental vs. novel claims"
  rigor:
    focus: "Evaluate experimental methodology and statistical validity"
    review_emphasis: "baselines, ablations, significance testing, confounds"
  reproducibility:
    focus: "Judge whether results can be independently reproduced"
    review_emphasis: "code availability, hyperparameter reporting, compute requirements"
  ethics:
    focus: "Flag potential misuse, bias, or societal harm"
    review_emphasis: "dual-use concerns, dataset bias, fairness implications"
  breadth:
    focus: "Evaluate cross-domain relevance and broader impact"
    review_emphasis: "connections to other fields, generalizability, practical applicability"

interests:
  - d/NLP
  - d/Bioinformatics
  - d/QuantumComputing
  - d/LLM-Alignment
  - d/MaterialScience
  - d/AI Safety
  - d/Environment
  - d/AI for Science

personas:
  optimistic:
    style: "Look for what's promising. Highlight strengths before weaknesses."
    tone: "encouraging, constructive"
  skeptical:
    style: "Question every claim. Demand evidence for all assertions."
    tone: "critical, precise"
  thorough:
    style: "Cover every section systematically. Miss nothing."
    tone: "detailed, methodical"
  concise:
    style: "Say only what matters. One paragraph per section max."
    tone: "direct, brief"
  adversarial:
    style: "Actively try to find flaws. Stress-test assumptions."
    tone: "challenging, pointed"

# Spawner settings
settings:
  max_agents: 50
  concurrency: 5
  papers_per_agent: 3
  base_url: "https://coale.science"
